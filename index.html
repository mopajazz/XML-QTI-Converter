<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodle XML → QTI Converter</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #dddbd3;
    --border2: #c8c6bc;
    --text: #1a1917;
    --text2: #6b6960;
    --text3: #9b9a92;
    --accent: #1a1917;
    --accent-fg: #f5f4f0;
    --green: #1a5c3a;
    --green-bg: #e8f5ee;
    --amber: #7a4a00;
    --amber-bg: #fef3db;
    --red: #8b1a1a;
    --red-bg: #fdeaea;
    --blue: #1a3a6b;
    --blue-bg: #e8eef8;
    --purple: #3d1a6b;
    --purple-bg: #f0eaf8;
    --teal: #0f5050;
    --teal-bg: #e5f4f4;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 6px;
    --radius-lg: 10px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 13px; color: var(--text2); }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 1.5rem;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .drop-icon { font-size: 28px; margin-bottom: 0.75rem; line-height: 1; }
  .drop-main { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .drop-sub { font-size: 13px; color: var(--text2); }
  .drop-zone input[type=file] { display: none; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.875rem 1rem;
  }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; letter-spacing: -0.03em; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .toolbar label { font-size: 13px; color: var(--text2); }
  select {
    font-family: var(--font);
    font-size: 13px;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius);
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    transition: background 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }
  .spacer { flex: 1; }

  .q-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .q-head {
    display: grid;
    grid-template-columns: 1fr 160px 80px 80px;
    gap: 8px;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .q-row {
    display: grid;
    grid-template-columns: 1fr 160px 80px 80px;
    gap: 8px;
    padding: 9px 14px;
    font-size: 13px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .q-row:last-child { border-bottom: none; }
  .q-row:hover { background: var(--surface2); }
  .q-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
    font-family: var(--mono);
  }
  .badge-mc     { background: var(--blue-bg);   color: var(--blue); }
  .badge-tf     { background: var(--green-bg);  color: var(--green); }
  .badge-sa     { background: var(--amber-bg);  color: var(--amber); }
  .badge-essay  { background: var(--purple-bg); color: var(--purple); }
  .badge-match  { background: var(--teal-bg);   color: var(--teal); }
  .badge-num    { background: var(--red-bg);    color: var(--red); }
  .badge-other  { background: var(--surface2);  color: var(--text2); }

  .status-ok   { font-size: 12px; color: var(--green); font-family: var(--mono); }
  .status-warn { font-size: 12px; color: var(--amber); font-family: var(--mono); }

  .log-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    max-height: 130px;
    overflow-y: auto;
    line-height: 1.7;
  }
  .log-ok   { color: var(--green); }
  .log-warn { color: var(--amber); }
  .log-err  { color: var(--red); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Moodle XML → QTI</h1>
    <p>Convert Moodle question bank exports to IMS QTI format</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xml">
    <div class="drop-icon">↑</div>
    <div class="drop-main">Click to upload or drag and drop</div>
    <div class="drop-sub">Moodle XML question bank export (.xml)</div>
  </div>

  <div class="stats-grid hidden" id="statsGrid"></div>

  <div class="toolbar hidden" id="toolbar">
    <label for="qtiVersion">QTI version</label>
    <select id="qtiVersion">
      <option value="1.2" selected>QTI 1.2 - Canvas/New Quizzes</option>
      <option value="2.1">QTI 2.1 - experimental</option>
    </select>
    <label for="zipOption">Package as</label>
    <select id="zipOption">
      <option value="xml" selected>Single XML file</option>
      <option value="zip">Canvas ZIP with manifest</option>
    </select>
    <div class="spacer"></div>
    <button class="btn" id="btnClear">Clear</button>
    <button class="btn btn-primary" id="btnConvert" disabled>Convert &amp; download ↓</button>
  </div>

  <div class="q-table hidden" id="qTable">
    <div class="q-head">
      <span>Question name</span>
      <span>Type</span>
      <span>Points</span>
      <span>Status</span>
    </div>
    <div id="qRows"></div>
  </div>

  <div class="log-box hidden" id="logBox"></div>

</div>

<!-- JSZip for zip packaging -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const statsGrid = document.getElementById('statsGrid');
const toolbar   = document.getElementById('toolbar');
const qTable    = document.getElementById('qTable');
const qRows     = document.getElementById('qRows');
const btnConvert= document.getElementById('btnConvert');
const btnClear  = document.getElementById('btnClear');
const logBox    = document.getElementById('logBox');
const qtiVersion= document.getElementById('qtiVersion');
const zipOption = document.getElementById('zipOption');

let parsedQuestions = [];
let parseReport = emptyParseReport();

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) handleFile(fileInput.files[0]); });

btnClear.addEventListener('click', reset);
btnConvert.addEventListener('click', doConvert);

function reset() {
  parsedQuestions = [];
  parseReport = emptyParseReport();
  fileInput.value = '';
  logBox.innerHTML = '';
  qRows.innerHTML = '';
  ['statsGrid','toolbar','qTable','logBox'].forEach(id => document.getElementById(id).classList.add('hidden'));
  btnConvert.disabled = true;
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parsedQuestions = parseMoodle(e.target.result);
      renderUI(file.name);
    } catch(err) {
      log('Parse error: ' + err.message, 'err');
      logBox.classList.remove('hidden');
    }
  };
  reader.readAsText(file);
}

function parseMoodle(xmlStr) {
  parseReport = emptyParseReport();
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('Invalid XML - make sure this is a Moodle XML export');
  const questions = [];
  doc.querySelectorAll('question').forEach((q, i) => {
    const type = q.getAttribute('type') || 'unknown';
    if (type === 'category') return;
    const qRecord = { assets: [], externalImages: [] };
    const name   = cleanPlainText(getText(q, 'name text') || `Question ${i+1}`);
    const text   = getMoodleHTML(q, 'questiontext', qRecord, `${name} question text`) || '';
    const points = parseFloat(getText(q, 'defaultgrade') || '1') || 1;
    const single = (getText(q, 'single') || 'true').trim().toLowerCase() !== 'false';
    let answers = [];

    if (type === 'matching') {
      answers = getChildElements(q, 'subquestion').map((sq, n) => {
        const source = getDirectTextHTML(sq, qRecord, `${name} match prompt ${n+1}`);
        const answerEl = getChildElements(sq, 'answer')[0];
        const match = answerEl ? getDirectTextHTML(answerEl, qRecord, `${name} match answer ${n+1}`) : '';
        return { text: source, match, fraction: 100 };
      }).filter(a => stripTags(a.text).trim() && stripTags(a.match).trim());
    } else {
      getChildElements(q, 'answer').forEach((a, n) => {
        answers.push({
          text: getDirectTextHTML(a, qRecord, `${name} answer ${n+1}`) || '',
          fraction: parseFloat(a.getAttribute('fraction')||'0')
        });
      });
    }

    const noAnswers = answers.length === 0 && !['essay','description','cloze'].includes(type);
    const noCorrect = ['multichoice','truefalse','shortanswer'].includes(type) && !answers.some(a => a.fraction > 0);
    const emptyText = !stripTags(text).trim() && !/<img\b/i.test(text);
    const status = noAnswers || noCorrect || emptyText ? 'warn' : 'ok';
    questions.push({ ...qRecord, type, name, text, points, answers, single, status });
  });
  return questions;
}

function getText(el, selector) {
  const found = el.querySelector(selector);
  return found ? found.textContent.trim() : null;
}

function getHTML(el, selector) {
  const found = el.querySelector(selector);
  if (!found) return null;
  const raw = found.innerHTML.trim();
  const looksHtml = /<[a-z][\s\S]*>/i.test(raw);
  return looksHtml ? raw : esc(found.textContent.trim());
}

function emptyParseReport() {
  return { sanitized: 0, embeddedImages: 0, externalImages: 0, warnings: [] };
}

function getChildElements(el, tagName) {
  return Array.from(el.children || []).filter(child => child.tagName.toLowerCase() === tagName);
}

function getMoodleHTML(questionEl, containerTag, qRecord, context) {
  const container = getChildElements(questionEl, containerTag)[0] || questionEl.querySelector(containerTag);
  if (!container) return '';
  return getDirectTextHTML(container, qRecord, context);
}

function getDirectTextHTML(container, qRecord, context) {
  const textEl = getChildElements(container, 'text')[0] || container.querySelector('text');
  const raw = textEl ? textEl.textContent : container.textContent;
  const files = collectMoodleFiles(container);
  return sanitizeRichText(raw || '', files, qRecord, context);
}

function collectMoodleFiles(container) {
  const files = new Map();
  if (!container) return files;
  container.querySelectorAll('file').forEach(fileEl => {
    const encoding = (fileEl.getAttribute('encoding') || '').toLowerCase();
    if (encoding && encoding !== 'base64') return;

    const name = fileEl.getAttribute('name') || 'image';
    const path = fileEl.getAttribute('path') || '/';
    const mime = fileEl.getAttribute('mime') || guessMimeType(name);
    const data = (fileEl.textContent || '').replace(/\s+/g, '');
    if (!data) return;

    const normalizedPath = normalizePluginPath(`${path}/${name}`);
    const record = { name, path: normalizedPath, mime, data };
    [name, decodeURIComponentSafe(name), normalizedPath, `@@PLUGINFILE@@/${normalizedPath}`].forEach(key => {
      files.set(normalizePluginPath(key), record);
    });
  });
  return files;
}

function sanitizeRichText(raw, fileMap, qRecord, context) {
  const before = raw || '';
  const cleanedSource = before
    .replace(/<!--[\s\S]*?-->/g, '')
    .replace(/\u00a0/g, ' ')
    .trim();
  const doc = new DOMParser().parseFromString(`<div>${cleanedSource}</div>`, 'text/html');
  const host = doc.body.firstElementChild;
  const html = Array.from(host.childNodes).map(node => serializeCleanNode(node, fileMap, qRecord, context)).join('');
  const compact = html.replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
  if (changedMeaningfully(before, compact)) parseReport.sanitized += 1;
  if (compact) return compact;
  return /<[a-z][\s\S]*>/i.test(before) ? '' : esc(cleanPlainText(before));
}

function serializeCleanNode(node, fileMap, qRecord, context) {
  if (node.nodeType === Node.TEXT_NODE) return esc(normalizeText(node.textContent || ''));
  if (node.nodeType !== Node.ELEMENT_NODE) return '';

  const blocked = new Set(['script','style','iframe','object','embed','form','input','button','select','textarea','meta','link','svg','canvas']);
  const allowed = new Set(['p','br','div','span','strong','b','em','i','u','sub','sup','ul','ol','li','blockquote','pre','code','table','thead','tbody','tr','th','td','img','a']);
  let tag = node.tagName.toLowerCase();

  if (blocked.has(tag)) {
    parseReport.sanitized += 1;
    return '';
  }
  if (!allowed.has(tag)) {
    return Array.from(node.childNodes).map(child => serializeCleanNode(child, fileMap, qRecord, context)).join('');
  }
  if (tag === 'b') tag = 'strong';
  if (tag === 'i') tag = 'em';
  if (tag === 'div' || tag === 'span') tag = hasBlockChildren(node) ? 'p' : 'span';

  if (tag === 'br') return '<br/>';
  if (tag === 'img') return serializeImage(node, fileMap, qRecord, context);

  const attrs = [];
  if (tag === 'a') {
    const href = cleanUrl(node.getAttribute('href') || '');
    if (href) attrs.push(`href="${esc(href)}"`);
  }
  if (tag === 'td' || tag === 'th') {
    ['colspan','rowspan'].forEach(attr => {
      const value = parseInt(node.getAttribute(attr) || '', 10);
      if (value > 1 && value < 20) attrs.push(`${attr}="${value}"`);
    });
  }

  const inner = Array.from(node.childNodes).map(child => serializeCleanNode(child, fileMap, qRecord, context)).join('').trim();
  if (!inner && !['td','th'].includes(tag)) return '';
  return `<${tag}${attrs.length ? ' ' + attrs.join(' ') : ''}>${inner}</${tag}>`;
}

function serializeImage(node, fileMap, qRecord, context) {
  const rawSrc = (node.getAttribute('src') || '').trim();
  const resolved = resolveImageSource(rawSrc, fileMap, qRecord, context);
  if (!resolved) return '';
  const alt = cleanPlainText(node.getAttribute('alt') || node.getAttribute('title') || 'Image');
  const attrs = [`src="${esc(resolved)}"`, `alt="${esc(alt)}"`];
  ['width','height'].forEach(attr => {
    const value = parseInt(node.getAttribute(attr) || '', 10);
    if (value > 0 && value < 4000) attrs.push(`${attr}="${value}"`);
  });
  return `<img ${attrs.join(' ')}/>`;
}

function resolveImageSource(src, fileMap, qRecord, context) {
  if (!src) return '';
  if (/^javascript:/i.test(src)) {
    parseReport.sanitized += 1;
    return '';
  }

  const dataMatch = src.match(/^data:(image\/[a-z0-9.+-]+);base64,([\s\S]+)$/i);
  if (dataMatch) {
    const ext = extensionForMime(dataMatch[1]);
    return addAsset(qRecord, `embedded-image.${ext}`, dataMatch[1], dataMatch[2].replace(/\s+/g, ''));
  }

  const pluginPath = normalizePluginPath(src.replace(/^@@PLUGINFILE@@\/?/i, ''));
  const fileRecord = fileMap.get(pluginPath) || fileMap.get(normalizePluginPath(decodeURIComponentSafe(pluginPath))) || fileMap.get(normalizePluginPath(pluginPath.split('/').pop() || ''));
  if (fileRecord) {
    return addAsset(qRecord, fileRecord.name, fileRecord.mime, fileRecord.data);
  }

  const url = cleanUrl(src);
  if (/^https?:\/\//i.test(url)) {
    const ext = extensionFromUrl(url) || 'png';
    const local = uniqueAssetPath(qRecord, `remote-image.${ext}`);
    qRecord.externalImages.push({ original: url, local, context });
    parseReport.externalImages += 1;
    return url;
  }

  parseReport.warnings.push(`Image not packaged in ${context}: ${src}`);
  return '';
}

function addAsset(qRecord, filename, mime, base64) {
  const cleanName = safeFilename(filename || `image.${extensionForMime(mime)}`);
  const existing = qRecord.assets.find(asset => asset.base64 === base64);
  if (existing) return existing.path;
  const path = uniqueAssetPath(qRecord, cleanName);
  qRecord.assets.push({ path, filename: cleanName, mimeType: mime || guessMimeType(cleanName), base64 });
  parseReport.embeddedImages += 1;
  return path;
}

function uniqueAssetPath(qRecord, filename) {
  const safe = safeFilename(filename);
  const dot = safe.lastIndexOf('.');
  const stem = dot > 0 ? safe.slice(0, dot) : safe;
  const ext = dot > 0 ? safe.slice(dot) : '';
  let candidate = `assets/${safe}`;
  let n = 2;
  const used = new Set([
    ...qRecord.assets.map(asset => asset.path),
    ...qRecord.externalImages.map(asset => asset.local)
  ]);
  while (used.has(candidate)) {
    candidate = `assets/${stem}-${n}${ext}`;
    n += 1;
  }
  return candidate;
}

async function prepareExternalImages(questions) {
  let imported = 0;
  let failed = 0;
  for (const q of questions) {
    for (const image of q.externalImages) {
      if (image.done) continue;
      try {
        const response = await fetch(image.original, { credentials: 'include' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        if (!/^image\//i.test(blob.type || '')) throw new Error('not an image');
        const base64 = await blobToBase64(blob);
        q.assets.push({ path: image.local, filename: image.local.split('/').pop(), mimeType: blob.type || guessMimeType(image.local), base64 });
        replaceImageReference(q, image.original, image.local);
        image.done = true;
        imported += 1;
      } catch (err) {
        failed += 1;
        parseReport.warnings.push(`Could not import remote image in ${image.context}: ${image.original}`);
      }
    }
  }
  return { imported, failed };
}

function replaceImageReference(question, from, to) {
  const replace = value => String(value || '').split(`src="${esc(from)}"`).join(`src="${esc(to)}"`);
  question.text = replace(question.text);
  question.answers.forEach(answer => {
    answer.text = replace(answer.text);
    if (answer.match) answer.match = replace(answer.match);
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function questionsForSingleXml(questions) {
  return questions.map(q => {
    const clone = {
      ...q,
      answers: q.answers.map(answer => ({ ...answer })),
      inlinedAssetCount: 0,
      omittedAssetCount: 0
    };

    (q.assets || []).forEach(asset => {
      clone.text = removeImageBySrc(clone.text, asset.path);
      clone.answers.forEach(answer => {
        answer.text = removeImageBySrc(answer.text, asset.path);
        if (answer.match) answer.match = removeImageBySrc(answer.match, asset.path);
      });
      clone.omittedAssetCount += 1;
    });

    return clone;
  });
}

function replaceSrc(html, from, to) {
  const escapedFrom = esc(from);
  const escapedTo = esc(to);
  return String(html || '')
    .split(`src="${escapedFrom}"`).join(`src="${escapedTo}"`)
    .split(`src='${escapedFrom}'`).join(`src='${escapedTo}'`);
}

function removeImageBySrc(html, src) {
  const doc = new DOMParser().parseFromString(`<div>${html || ''}</div>`, 'text/html');
  doc.querySelectorAll('img').forEach(img => {
    const raw = img.getAttribute('src') || '';
    if (raw === src || raw === esc(src)) {
      const alt = cleanPlainText(img.getAttribute('alt') || 'image omitted');
      img.replaceWith(doc.createTextNode(`[${alt}]`));
    }
  });
  return doc.body.firstElementChild.innerHTML;
}

function cleanUrl(url) {
  const trimmed = String(url || '').trim().replace(/[\u0000-\u001f\u007f]/g, '');
  if (!trimmed || /^javascript:/i.test(trimmed) || /^data:(?!image\/)/i.test(trimmed)) return '';
  return trimmed.replace(/&amp;/g, '&');
}

function safeFilename(name) {
  const decoded = decodeURIComponentSafe(String(name || 'image'));
  const base = decoded.split(/[\\/]/).pop().replace(/[^a-z0-9._-]+/gi, '-').replace(/^-+|-+$/g, '') || 'image';
  return base.includes('.') ? base : `${base}.png`;
}

function guessMimeType(filename) {
  const ext = String(filename || '').split('.').pop().toLowerCase();
  const map = { jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', gif:'image/gif', webp:'image/webp', svg:'image/svg+xml', bmp:'image/bmp' };
  return map[ext] || 'image/png';
}

function extensionForMime(mime) {
  const map = { 'image/jpeg':'jpg', 'image/png':'png', 'image/gif':'gif', 'image/webp':'webp', 'image/svg+xml':'svg', 'image/bmp':'bmp' };
  return map[String(mime || '').toLowerCase()] || 'png';
}

function extensionFromUrl(url) {
  const clean = String(url || '').split('?')[0].split('#')[0];
  const match = clean.match(/\.([a-z0-9]{2,5})$/i);
  return match ? match[1].toLowerCase() : '';
}

function normalizePluginPath(path) {
  return decodeURIComponentSafe(String(path || ''))
    .replace(/^@@PLUGINFILE@@\/?/i, '')
    .replace(/^\/+/, '')
    .replace(/\/+/g, '/');
}

function decodeURIComponentSafe(value) {
  try { return decodeURIComponent(value); } catch { return value; }
}

function cleanPlainText(value) {
  return normalizeText(String(value || '').replace(/<[^>]*>/g, ' ')).trim();
}

function normalizeText(value) {
  return String(value || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ');
}

function stripTags(value) {
  const doc = new DOMParser().parseFromString(String(value || ''), 'text/html');
  return doc.body.textContent || '';
}

function hasBlockChildren(node) {
  return Array.from(node.children || []).some(child => /^(p|div|ul|ol|table|blockquote|pre)$/i.test(child.tagName));
}

function changedMeaningfully(before, after) {
  const roughBefore = String(before || '').replace(/\s+/g, ' ').trim();
  const roughAfter = String(after || '').replace(/\s+/g, ' ').trim();
  return roughBefore !== roughAfter;
}

function correctAnswers(q) {
  return q.answers
    .map((a, i) => ({ ...a, index: i }))
    .filter(a => a.fraction > 0);
}

function renderUI(filename) {
  const types = {};
  parsedQuestions.forEach(q => types[q.type] = (types[q.type]||0)+1);
  const supported = parsedQuestions.filter(q => ['multichoice','truefalse','shortanswer','essay','matching','numerical'].includes(q.type)).length;

  statsGrid.classList.remove('hidden');
  statsGrid.innerHTML = [
    { label: 'Total questions', val: parsedQuestions.length },
    { label: 'Supported',       val: supported },
    { label: 'Unsupported',     val: parsedQuestions.length - supported },
    { label: 'Question types',  val: Object.keys(types).length }
  ].map(s => `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`).join('');

  qRows.innerHTML = parsedQuestions.map(q => `
    <div class="q-row">
      <span class="q-name" title="${esc(q.name)}">${esc(q.name)}</span>
      <span>${typeBadge(q.type)}</span>
      <span style="font-size:13px;color:var(--text2)">${q.points}</span>
      <span class="status-${q.status}">${q.status === 'ok' ? '✓ ready' : '⚠ check'}</span>
    </div>`).join('');

  toolbar.classList.remove('hidden');
  qTable.classList.remove('hidden');
  btnConvert.disabled = false;

  log(`Loaded "${filename}" — ${parsedQuestions.length} questions`, 'ok');
  if (parseReport.sanitized) log(`Sanitized ${parseReport.sanitized} question/answer blocks`, 'ok');
  if (parseReport.embeddedImages) log(`Found ${parseReport.embeddedImages} embedded image file(s) for ZIP export`, 'ok');
  if (parseReport.externalImages) log(`${parseReport.externalImages} remote image(s) will be imported into ZIP if the source allows browser access`, 'warn');
  parseReport.warnings.slice(0, 5).forEach(w => log(w, 'warn'));
  if (parseReport.warnings.length > 5) log(`${parseReport.warnings.length - 5} more cleanup warning(s) hidden`, 'warn');
  const unsup = Object.keys(types).filter(t => !['multichoice','truefalse','shortanswer','essay','matching','numerical'].includes(t));
  if (unsup.length) log(`Unsupported types (exported as essay): ${unsup.join(', ')}`, 'warn');
  logBox.classList.remove('hidden');
}

function typeBadge(type) {
  const map = { multichoice:'mc', truefalse:'tf', shortanswer:'sa', essay:'essay', matching:'match', numerical:'num' };
  const labels = { multichoice:'multiple choice', truefalse:'true/false', shortanswer:'short answer', essay:'essay', matching:'matching', numerical:'numerical' };
  const cls = map[type] ? `badge-${map[type]}` : 'badge-other';
  return `<span class="badge ${cls}">${labels[type]||type}</span>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matHTML(s) {
  return esc(s).replace(/'/g,'&apos;');
}

async function doConvert() {
  const ver = qtiVersion.value;
  const pkg = zipOption.value;
  btnConvert.disabled = true;

  try {
    if (pkg === 'zip') {
      const externalResult = await prepareExternalImages(parsedQuestions);
      if (externalResult.imported) log(`Imported ${externalResult.imported} remote image(s) into the ZIP`, 'ok');
      if (externalResult.failed) log(`${externalResult.failed} remote image(s) could not be imported; source may require login or block browser downloads`, 'warn');

      const zip = new JSZip();
      const itemIds = [];

      parsedQuestions.forEach(q => {
        const id = 'q_' + Math.random().toString(36).slice(2,9);
        itemIds.push({ id, name: q.name, assets: q.assets || [] });
        const xml = ver === '2.1' ? buildQTI21SingleItem(id, q) : buildQTI12SingleItem(id, q);
        zip.file(`${id}/${id}.xml`, xml);
        (q.assets || []).forEach(asset => {
          zip.file(`${id}/${asset.path}`, asset.base64, { base64: true });
        });
      });

      zip.file('imsmanifest.xml', buildManifest(itemIds, ver));
      const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE' });
      triggerDownload(blob, `canvas_qti_${ver}.zip`, 'application/zip');
      log(`Downloaded Canvas-ready ZIP with ${parsedQuestions.length} question files (QTI ${ver})`, 'ok');
    } else {
      const externalResult = await prepareExternalImages(parsedQuestions);
      if (externalResult.imported) log(`Embedded ${externalResult.imported} remote image(s) into the XML as data URLs`, 'ok');
      if (externalResult.failed) log(`${externalResult.failed} remote image(s) could not be embedded; source may require login or block browser downloads`, 'warn');

      const xmlQuestions = questionsForSingleXml(parsedQuestions);
      const omittedAssetCount = xmlQuestions.reduce((sum, q) => sum + (q.omittedAssetCount || 0), 0);
      if (omittedAssetCount) log(`Omitted ${omittedAssetCount} embedded image file(s) from XML to keep Canvas import stable; use ZIP for image packaging`, 'warn');
      if (ver === '2.1') log('Standalone Canvas XML is safest as QTI 1.2; exporting QTI 1.2 XML instead of experimental QTI 2.1', 'warn');
      const xml = buildQTI12ItemBank(xmlQuestions);
      const blob = new Blob([xml], { type:'application/xml' });
      triggerDownload(blob, `canvas_qti_1.2_export.xml`, 'application/xml');
      log(`Downloaded canvas_qti_1.2_export.xml (${parsedQuestions.length} questions)`, 'ok');
    }
  } finally {
    btnConvert.disabled = false;
  }
}

function triggerDownload(blob, filename, type) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function log(msg, cls='') {
  const d = document.createElement('div');
  if (cls) d.className = 'log-' + cls;
  d.textContent = '› ' + msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

/* ── QTI 2.1 ── */
function buildQTI21(questions) {
  const items = questions.map(q => {
    const id = 'q_' + Math.random().toString(36).slice(2,9);
    if (q.type === 'multichoice') return qti21MC(id, q);
    if (q.type === 'truefalse')   return qti21TF(id, q);
    if (q.type === 'shortanswer') return qti21SA(id, q);
    if (q.type === 'numerical')   return qti21Num(id, q);
    if (q.type === 'matching')    return qti21Match(id, q);
    return qti21Essay(id, q);
  }).join('\n\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<assessmentTest xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="moodle_export" title="Moodle Export">

${items}

</assessmentTest>`;
}

function qti21MC(id, q) {
  const choices = q.answers.map((a,i) =>
    `        <simpleChoice identifier="${id}_c${i}">${a.text}</simpleChoice>`).join('\n');
  const correct = correctAnswers(q);
  const correctIds = (correct.length ? correct : [{ index: 0 }]).map(a => `${id}_c${a.index}`);
  const cardinality = correctIds.length > 1 || q.single === false ? 'multiple' : 'single';
  const maxChoices = cardinality === 'multiple' ? Math.max(correctIds.length, q.answers.length) : 1;
  const corrVals = correctIds.map(corrId => `<value>${corrId}</value>`).join('');
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="${cardinality}" baseType="identifier">
      <correctResponse>${corrVals}</correctResponse>
    </responseDeclaration>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <choiceInteraction responseIdentifier="RESPONSE" shuffle="false" maxChoices="${maxChoices}">
${choices}
      </choiceInteraction>
    </itemBody>
    <responseProcessing template="http://www.imsglobal.org/question/qti_v2p1/rptemplates/match_correct"/>
  </assessmentItem>`;
}

function qti21TF(id, q) {
  const correct = q.answers.find(a => a.fraction > 0);
  const corrText = correct ? stripTags(correct.text).trim().toLowerCase() : '';
  const corrVal = corrText === 'true' ? 'true' : 'false';
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="single" baseType="identifier">
      <correctResponse><value>${corrVal}</value></correctResponse>
    </responseDeclaration>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <choiceInteraction responseIdentifier="RESPONSE" shuffle="false" maxChoices="1">
        <simpleChoice identifier="true">True</simpleChoice>
        <simpleChoice identifier="false">False</simpleChoice>
      </choiceInteraction>
    </itemBody>
    <responseProcessing template="http://www.imsglobal.org/question/qti_v2p1/rptemplates/match_correct"/>
  </assessmentItem>`;
}

function qti21SA(id, q) {
  const corrVals = q.answers.filter(a => a.fraction > 0)
    .map(a => `      <value>${esc(stripTags(a.text).trim())}</value>`).join('\n');
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="single" baseType="string">
      <correctResponse>
${corrVals}
      </correctResponse>
    </responseDeclaration>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <textEntryInteraction responseIdentifier="RESPONSE" expectedLength="30"/>
    </itemBody>
  </assessmentItem>`;
}

function qti21Num(id, q) {
  const correct = q.answers[0];
  const corrVal = correct ? stripTags(correct.text).trim() : '0';
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="single" baseType="float">
      <correctResponse><value>${esc(corrVal)}</value></correctResponse>
    </responseDeclaration>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <textEntryInteraction responseIdentifier="RESPONSE" expectedLength="12"/>
    </itemBody>
  </assessmentItem>`;
}

function qti21Essay(id, q) {
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="single" baseType="string"/>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <extendedTextInteraction responseIdentifier="RESPONSE" expectedLines="10"/>
    </itemBody>
  </assessmentItem>`;
}

function qti21Match(id, q) {
  const srcChoices = q.answers.map((a,i) =>
    `        <simpleAssociableChoice identifier="${id}_s${i}" matchMax="1">${a.text}</simpleAssociableChoice>`).join('\n');
  const dstChoices = q.answers.map((a,i) =>
    `        <simpleAssociableChoice identifier="${id}_d${i}" matchMax="1">${a.match || a.text}</simpleAssociableChoice>`).join('\n');
  const corrPairs = q.answers.map((_,i) => `      <value>${id}_s${i} ${id}_d${i}</value>`).join('\n');
  return `<assessmentItem xmlns="http://www.imsglobal.org/xsd/imsqti_v2p1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imsqti_v2p1 http://www.imsglobal.org/xsd/qti/qtiv2p1/imsqti_v2p1.xsd"
  identifier="${id}" title="${esc(q.name)}" adaptive="false" timeDependent="false">
    <responseDeclaration identifier="RESPONSE" cardinality="multiple" baseType="directedPair">
      <correctResponse>
${corrPairs}
      </correctResponse>
    </responseDeclaration>
    <outcomeDeclaration identifier="SCORE" cardinality="single" baseType="float">
      <defaultValue><value>0</value></defaultValue>
    </outcomeDeclaration>
    <itemBody>
      ${q.text}
      <matchInteraction responseIdentifier="RESPONSE" shuffle="false" maxAssociations="${q.answers.length}">
        <simpleMatchSet>
${srcChoices}
        </simpleMatchSet>
        <simpleMatchSet>
${dstChoices}
        </simpleMatchSet>
      </matchInteraction>
    </itemBody>
  </assessmentItem>`;
}

/* ── QTI 1.2 ── */
function buildQTI12(questions) {
  const items = questions.map(q => {
    const id = 'q_' + Math.random().toString(36).slice(2,9);
    if (q.type === 'multichoice') return qti12MC(id, q);
    if (q.type === 'truefalse')   return qti12TF(id, q);
    if (q.type === 'shortanswer') return qti12SA(id, q);
    return qti12Essay(id, q);
  }).join('\n\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<questestinterop xmlns="http://www.imsproject.org/xsd/ims_qtiasiv1p2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsproject.org/xsd/ims_qtiasiv1p2 http://www.imsproject.org/xsd/ims_qtiasiv1p2.xsd">
  <assessment title="Moodle Export" ident="moodle_export">
    <section ident="root_section">

${items}

    </section>
  </assessment>
</questestinterop>`;
}

function buildQTI12ItemBank(questions) {
  const items = questions.map((q, idx) => {
    const id = `q_${idx + 1}_${slugId(q.name)}`;
    if (q.type === 'multichoice') return qti12MC(id, q);
    if (q.type === 'truefalse')   return qti12TF(id, q);
    if (q.type === 'shortanswer') return qti12SA(id, q);
    return qti12Essay(id, q);
  }).join('\n\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<questestinterop xmlns="http://www.imsproject.org/xsd/ims_qtiasiv1p2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsproject.org/xsd/ims_qtiasiv1p2 http://www.imsproject.org/xsd/ims_qtiasiv1p2.xsd">

${items}

</questestinterop>`;
}

function slugId(value) {
  const slug = cleanPlainText(value).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 28);
  return slug || Math.random().toString(36).slice(2, 9);
}

function qti12Metadata(q, questionType) {
  return `        <itemmetadata>
          <qtimetadata>
            <qtimetadatafield><fieldlabel>question_type</fieldlabel><fieldentry>${questionType}</fieldentry></qtimetadatafield>
            <qtimetadatafield><fieldlabel>points_possible</fieldlabel><fieldentry>${esc(q.points)}</fieldentry></qtimetadatafield>
          </qtimetadata>
        </itemmetadata>`;
}

function qti12MC(id, q) {
  const choices = q.answers.map((a,i) =>
    `          <response_label ident="${id}_c${i}"><material><mattext texttype="text/html">${matHTML(a.text)}</mattext></material></response_label>`).join('\n');
  const correct = correctAnswers(q);
  const correctIds = (correct.length ? correct : [{ index: 0 }]).map(a => `${id}_c${a.index}`);
  const cardinality = correctIds.length > 1 || q.single === false ? 'Multiple' : 'Single';
  const condition = correctIds.length > 1
    ? `<and>${correctIds.map(corrId => `<varequal respident="${id}">${corrId}</varequal>`).join('')}</and>`
    : `<varequal respident="${id}">${correctIds[0]}</varequal>`;
  const questionType = cardinality === 'Multiple' ? 'multiple_answers_question' : 'multiple_choice_question';
  return `      <item ident="${id}" title="${esc(q.name)}">
${qti12Metadata(q, questionType)}
        <presentation>
          <material><mattext texttype="text/html">${matHTML(q.text)}</mattext></material>
          <response_lid ident="${id}" rcardinality="${cardinality}">
            <render_choice>
${choices}
            </render_choice>
          </response_lid>
        </presentation>
        <resprocessing>
          <outcomes><decvar vartype="Decimal" defaultval="0"/></outcomes>
          <respcondition>
            <conditionvar>${condition}</conditionvar>
            <setvar action="Set">${q.points}</setvar>
          </respcondition>
        </resprocessing>
      </item>`;
}

function qti12TF(id, q) {
  const correct = q.answers.find(a => a.fraction > 0);
  const corrText = correct ? stripTags(correct.text).trim().toLowerCase() : '';
  const corrSuf = corrText === 'true' ? 'true' : 'false';
  return `      <item ident="${id}" title="${esc(q.name)}">
${qti12Metadata(q, 'true_false_question')}
        <presentation>
          <material><mattext texttype="text/html">${matHTML(q.text)}</mattext></material>
          <response_lid ident="${id}" rcardinality="Single">
            <render_choice>
              <response_label ident="${id}_true"><material><mattext texttype="text/plain">True</mattext></material></response_label>
              <response_label ident="${id}_false"><material><mattext texttype="text/plain">False</mattext></material></response_label>
            </render_choice>
          </response_lid>
        </presentation>
        <resprocessing>
          <outcomes><decvar vartype="Decimal" defaultval="0"/></outcomes>
          <respcondition>
            <conditionvar><varequal respident="${id}">${id}_${corrSuf}</varequal></conditionvar>
            <setvar action="Set">${q.points}</setvar>
          </respcondition>
        </resprocessing>
      </item>`;
}

function qti12SA(id, q) {
  const corrVals = q.answers.filter(a => a.fraction > 0)
    .map(a => `<varequal respident="${id}">${esc(stripTags(a.text).trim())}</varequal>`).join('');
  return `      <item ident="${id}" title="${esc(q.name)}">
${qti12Metadata(q, 'short_answer_question')}
        <presentation>
          <material><mattext texttype="text/html">${matHTML(q.text)}</mattext></material>
          <response_str ident="${id}" rcardinality="Single"><render_fib/></response_str>
        </presentation>
        <resprocessing>
          <outcomes><decvar vartype="Decimal" defaultval="0"/></outcomes>
          <respcondition>
            <conditionvar><or>${corrVals}</or></conditionvar>
            <setvar action="Set">${q.points}</setvar>
          </respcondition>
        </resprocessing>
      </item>`;
}

function qti12Essay(id, q) {
  return `      <item ident="${id}" title="${esc(q.name)}">
${qti12Metadata(q, 'essay_question')}
        <presentation>
          <material><mattext texttype="text/html">${matHTML(q.text)}</mattext></material>
          <response_str ident="${id}" rcardinality="Single"><render_fib rows="10" columns="80"/></response_str>
        </presentation>
      </item>`;
}

/* ── IMS Manifest (Canvas-compatible: one resource per question) ── */
function buildManifest(itemIds, ver) {
  const qtiType = ver === '2.1' ? 'imsqti_item_xmlv2p1' : 'imsqti_xmlv1p2';
  const resources = itemIds.map(({ id, name, assets = [] }) => {
    const files = [`      <file href="${id}/${id}.xml"/>`]
      .concat(assets.map(asset => `      <file href="${id}/${esc(asset.path)}"/>`))
      .join('\n');
    return `
    <resource identifier="${id}" type="${qtiType}" href="${id}/${id}.xml">
${files}
    </resource>`;
  }).join('');

  return `<?xml version="1.0" encoding="UTF-8"?>
<manifest identifier="moodle_qti_export"
  xmlns="http://www.imsglobal.org/xsd/imscp_v1p1"
  xmlns:imsmd="http://www.imsglobal.org/xsd/imsmd_v1p2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsglobal.org/xsd/imscp_v1p1 http://www.imsglobal.org/xsd/imscp_v1p1.xsd">
  <metadata>
    <schema>IMS QTI</schema>
    <schemaversion>${ver}</schemaversion>
  </metadata>
  <organizations/>
  <resources>${resources}
  </resources>
</manifest>`;
}

/* ── Single-item wrappers for ZIP export ── */
function buildQTI21SingleItem(id, q) {
  const inner = (() => {
    if (q.type === 'multichoice') return qti21MC(id, q);
    if (q.type === 'truefalse')   return qti21TF(id, q);
    if (q.type === 'shortanswer') return qti21SA(id, q);
    if (q.type === 'numerical')   return qti21Num(id, q);
    if (q.type === 'matching')    return qti21Match(id, q);
    return qti21Essay(id, q);
  })();
  return `<?xml version="1.0" encoding="UTF-8"?>
${inner.trim()}`;
}

function buildQTI12SingleItem(id, q) {
  const item = (() => {
    if (q.type === 'multichoice') return qti12MC(id, q);
    if (q.type === 'truefalse')   return qti12TF(id, q);
    if (q.type === 'shortanswer') return qti12SA(id, q);
    return qti12Essay(id, q);
  })();
  return `<?xml version="1.0" encoding="UTF-8"?>
<questestinterop xmlns="http://www.imsproject.org/xsd/ims_qtiasiv1p2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.imsproject.org/xsd/ims_qtiasiv1p2 http://www.imsproject.org/xsd/ims_qtiasiv1p2.xsd">
${item.trim()}
</questestinterop>`;
}
